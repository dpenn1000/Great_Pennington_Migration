  --border-str: rgba(184,106,42,0.55);

* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: var(--sand); color: var(--brown); height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

/* HEADER */
.header { background: #fff; border-bottom: 1px solid var(--border-md); flex-shrink: 0; }
.header-top { display: flex; align-items: center; justify-content: space-between; padding: 10px 20px 8px; gap: 16px; }
.logo { display: flex; align-items: stretch; }
.logo-bar { width: 3px; background: linear-gradient(to bottom, var(--copper), var(--turquoise)); border-radius: 2px; margin-right: 12px; flex-shrink: 0; }
.logo-text { display: flex; flex-direction: column; justify-content: center; line-height: 1; }
.logo-great { font-size: 9px; letter-spacing: 0.35em; color: var(--brown-lt); text-transform: uppercase; margin-bottom: 1px; }
.logo-penn { font-family: "Cormorant Garamond", serif; font-size: 30px; font-weight: 700; background: linear-gradient(135deg, #B86A2A 0%, #2A8FA5 55%, #E8C87A 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; line-height: 1.05; }
.logo-bot { display: flex; align-items: baseline; gap: 16px; margin-top: 1px; }
.logo-migration { font-size: 9px; letter-spacing: 0.35em; color: var(--brown-lt); text-transform: uppercase; }
.logo-nv { font-size: 9px; letter-spacing: 0.22em; color: var(--copper-lt); text-transform: uppercase; }
.header-right { display: flex; align-items: center; gap: 10px; flex-shrink: 0; }
.disclaimer { font-size: 10px; color: #bbb; white-space: nowrap; }
.export-btn { font-size: 11px; padding: 6px 13px; border-radius: 6px; border: 1px solid var(--border-md); background: none; cursor: pointer; color: var(--copper); font-weight: 600; transition: all 0.15s; }
.export-btn:hover { background: var(--sand); border-color: var(--copper); }
.tab-bar { display: flex; padding: 0 20px; border-top: 1px solid var(--border); }
.tab-btn { background: none; border: none; border-bottom: 2px solid transparent; padding: 7px 16px; font-size: 13px; font-weight: 500; color: var(--brown-lt); cursor: pointer; transition: all 0.15s; }
.tab-btn.active { color: var(--copper); border-bottom-color: var(--copper); font-weight: 600; }

/* PAGES */
.page { display: none; flex: 1; overflow: hidden; }
.page.active { display: flex; }
.leaflet-container { background: #ddd; }
.leaflet-popup-content { margin: 0; }
.leaflet-popup-content-wrapper { border-radius: 10px !important; padding: 0 !important; overflow: hidden; box-shadow: 0 8px 32px rgba(0,0,0,0.22) !important; }

/* COMMUNITY SIDEBAR (page 1) */
.side { width: 286px; min-width: 286px; display: flex; flex-direction: column; background: var(--sand-mid); border-right: 1px solid var(--border-md); overflow: hidden; }
.filters { display: flex; gap: 5px; padding: 9px 10px; border-bottom: 1px solid var(--border-md); background: var(--sand-dk); flex-shrink: 0; }
.fbtn { font-size: 11px; padding: 4px 12px; border-radius: 20px; border: 1px solid var(--border-md); background: #fff; cursor: pointer; color: var(--brown-lt); font-weight: 500; transition: all 0.15s; }
.fbtn.on { background: var(--copper); color: #fff; border-color: var(--copper); }
.clist { flex: 1; overflow-y: auto; padding: 8px; }
.cc { border-radius: 10px; border: 1px solid var(--border); margin-bottom: 9px; cursor: pointer; background: #fff; overflow: hidden; transition: all 0.15s; }
.cc:hover { border-color: var(--border-str); box-shadow: 0 3px 12px rgba(184,106,42,0.12); }
.cc.on { border: 2px solid var(--copper); box-shadow: 0 4px 16px rgba(184,106,42,0.2); }
.cc-photo { height: 86px; background-size: cover; background-position: center; background-color: var(--sand-dk); position: relative; }
.cc-overlay { position: absolute; inset: 0; background: linear-gradient(to top, rgba(74,38,8,0.6) 0%, transparent 58%); }
.cc-body { padding: 10px 12px 11px; }
.cc-head { display: flex; align-items: center; gap: 7px; margin-bottom: 2px; }
.cdot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.cc-name { font-size: 13px; font-weight: 700; color: var(--brown); }
.cc-sub { font-size: 10px; color: var(--brown-lt); margin-bottom: 5px; font-weight: 500; }
.cc-desc { font-size: 11px; color: var(--brown-lt); line-height: 1.45; margin-bottom: 6px; }
.tags { display: flex; flex-wrap: wrap; gap: 3px; }
.tag { font-size: 10px; padding: 2px 6px; border-radius: 4px; background: var(--sand-mid); color: var(--brown); border: 1px solid var(--border); }
.cc-foot { font-size: 10px; color: var(--copper-lt); margin-top: 6px; font-style: italic; }
.mwrap { flex: 1; position: relative; }
#m1, #m2 { width: 100%; height: 100%; }
.hint { font-size: 10px; color: var(--brown-lt); padding: 6px 12px; border-top: 1px solid var(--border-md); flex-shrink: 0; text-align: center; background: var(--sand-dk); }

/* COMPARISON PAGE */
.comp-side { width: 300px; min-width: 300px; display: flex; flex-direction: column; background: var(--sand-mid); border-right: 1px solid var(--border-md); overflow: hidden; }
.comp-top { padding: 8px 10px; border-bottom: 1px solid var(--border-md); background: var(--sand-dk); flex-shrink: 0; display: flex; align-items: center; justify-content: space-between; }
.comp-top-label { font-size: 11px; color: var(--brown-lt); font-weight: 600; }
.saved-badge { font-size: 10px; color: #5a9e5a; opacity: 0; transition: opacity 0.3s; font-weight: 600; }
.saved-badge.show { opacity: 1; }
.comp-list { flex: 1; overflow-y: scroll; padding: 7px; display: flex; flex-direction: column; gap: 8px; scrollbar-width: thin; scrollbar-color: rgba(184,106,42,0.4) transparent; }

/* COMPACT PROPERTY CARDS */
.hc { border-radius: 9px; border: 1px solid var(--border-md); background: #fff; cursor: pointer; transition: all 0.15s; padding: 0; overflow: hidden; min-height: 120px; }
.hc:hover { border-color: var(--border-str); box-shadow: 0 3px 10px rgba(184,106,42,0.14); }
.hc.on { border: 2px solid var(--copper); box-shadow: 0 4px 14px rgba(184,106,42,0.22); }

/* Horizontal card layout */
.hc-inner { display: flex; align-items: flex-start; gap: 0; }

/* Left: thumbnail column */
.hc-thumb-col { width: 76px; min-width: 76px; height: 76px; position: relative; background: var(--sand-mid); flex-shrink: 0; overflow: hidden; margin: 8px 0 8px 8px; border-radius: 7px; }
.hc-thumb { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; display: block; }
.hc-thumb-placeholder { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; background: var(--sand-mid); }
.hc-upload-label { position: absolute; bottom: 4px; left: 50%; transform: translateX(-50%); background: rgba(255,255,255,0.92); border: 1px solid var(--border-md); border-radius: 4px; padding: 2px 5px; font-size: 9px; color: var(--copper); cursor: pointer; font-weight: 600; white-space: nowrap; z-index: 2; }
.hc-upload-label input { display: none; }
.hc-comm-bar { position: absolute; top: 0; left: 0; right: 0; height: 3px; }

/* Right: details column */
.hc-details { flex: 1; padding: 8px 10px 9px; display: flex; flex-direction: column; gap: 0; min-width: 0; overflow: hidden; min-height: 120px; }
.hc-addr { font-size: 11px; font-weight: 700; color: #2a1000; line-height: 1.3; margin-bottom: 3px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.hc-meta { display: flex; align-items: center; gap: 5px; margin-bottom: 5px; flex-wrap: wrap; }
.bdg { font-size: 9px; padding: 1px 5px; border-radius: 3px; font-weight: 600; white-space: nowrap; }
.hc-price-line { display: flex; align-items: baseline; gap: 8px; margin-bottom: 3px; }
.hc-price { font-size: 15px; font-weight: 700; color: var(--copper); line-height: 1; }
.hc-dom { font-size: 9px; color: var(--brown-lt); }
.hc-stats-line { font-size: 10px; color: var(--brown-lt); margin-bottom: 5px; font-weight: 500; }
.hc-feats { display: flex; flex-wrap: wrap; gap: 2px; margin-bottom: 6px; }
.feat { font-size: 9px; padding: 1px 5px; border-radius: 8px; background: var(--sand); color: var(--brown); border: 1px solid var(--border); white-space: nowrap; }
.stars { display: flex; gap: 2px; margin-bottom: 6px; }
.star { font-size: 15px; cursor: pointer; color: var(--sand-dk); line-height: 1; transition: color 0.1s, transform 0.1s; }
.star.lit { color: var(--gold); }
.star:hover { color: var(--copper-lt); transform: scale(1.15); }
.hnotes { width: 100%; font-size: 10px; border: 1px solid var(--border-md); border-radius: 5px; padding: 4px 7px; resize: none; height: 38px; background: var(--sand-lt); color: var(--brown); font-family: inherit; outline: none; transition: border-color 0.15s; line-height: 1.4; }
.hnotes:focus { border-color: var(--copper); background: #fff; }
.hnotes::placeholder { color: var(--sand-dk); font-style: italic; }
.zlink { display: block; text-align: center; font-size: 9px; margin-top: 5px; padding: 4px 0; border-radius: 5px; border: 1px solid rgba(42,143,165,0.35); color: var(--turquoise); text-decoration: none; font-weight: 600; background: rgba(42,143,165,0.05); transition: all 0.15s; }
.zlink:hover { background: rgba(42,143,165,0.12); border-color: var(--turquoise); }

/* SCROLLBAR */
::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border-str); border-radius: 2px; }
</style>

function loadSaved(){
  try{const r=localStorage.getItem('penn26_R');if(r)st.R=JSON.parse(r);}catch(e){}
  try{const n=localStorage.getItem('penn26_N');if(n)st.N=JSON.parse(n);}catch(e){}
  try{const p=localStorage.getItem('penn26_P');if(p)st.photos=JSON.parse(p);}catch(e){}
}
function flash(){
  const el=document.getElementById('saved-ind');
  if(el){el.classList.add('show');clearTimeout(el._t);el._t=setTimeout(()=>el.classList.remove('show'),1800);}
}
function saveR(){try{localStorage.setItem('penn26_R',JSON.stringify(st.R));}catch(e){}}
function saveN(){try{localStorage.setItem('penn26_N',JSON.stringify(st.N));}catch(e){} flash();}
function saveP(){try{localStorage.setItem('penn26_P',JSON.stringify(st.photos));}catch(e){} flash();}

function compressPhoto(id,file){
  if(!file)return;
  const reader=new FileReader();
  reader.onload=function(e){
    const img=new Image();
    img.onload=function(){
      const canvas=document.createElement('canvas');
      const maxW=500;const scale=Math.min(1,maxW/img.width);
      canvas.width=Math.round(img.width*scale);canvas.height=Math.round(img.height*scale);
      canvas.getContext('2d').drawImage(img,0,0,canvas.width,canvas.height);
      st.photos[id]=canvas.toDataURL('image/jpeg',0.78);
      saveP();rGrid();
    };
    img.src=e.target.result;
  };
  reader.readAsDataURL(file);
}

function exportNotes(){
  const homes=flat();
  let txt='PENNINGTON HOUSE TOUR NOTES\nApril 15-16, 2026 | Las Vegas & Henderson, NV\n';
  txt+='Generated: '+new Date().toLocaleDateString('en-US',{month:'long',day:'numeric',year:'numeric'})+'\n';
  txt+='============================================\n\n';
  const rated=homes.filter(h=>st.R[h.id]||st.N[h.id]);
  const unrated=homes.filter(h=>!st.R[h.id]&&!st.N[h.id]);
  if(rated.length){
    txt+='REVIEWED\n\n';
    rated.forEach(h=>{
      const r=st.R[h.id]||0;
      txt+=h.cn+' | '+h.a+'\n';
      txt+=h.price+' | '+h.beds+'bd/'+h.baths+'ba | '+h.sqft.toLocaleString()+' sqft | '+h.dom+' days\n';
      txt+='Rating: '+'★'.repeat(r)+'☆'.repeat(5-r)+'\n';
      txt+='Notes: '+(st.N[h.id]||'(none)')+'\n';
      txt+=h.u+'\n\n';
    });
  }
  if(unrated.length){txt+='\nNOT YET REVIEWED\n';unrated.forEach(h=>{txt+=h.cn+' | '+h.a+' | '+h.price+'\n';});}
  const b=new Blob([txt],{type:'text/plain'});
  const u=URL.createObjectURL(b);
  const a=document.createElement('a');
  a.href=u;a.download='pennington-tour-notes.txt';a.click();URL.revokeObjectURL(u);
}

function mIcon(clr){
  const s=`<svg xmlns="http://www.w3.org/2000/svg" width="22" height="28" viewBox="0 0 22 28"><path d="M11 0C4.9 0 0 4.9 0 11c0 8.3 11 17 11 17S22 19.3 22 11C22 4.9 17.1 0 11 0z" fill="${clr}" stroke="rgba(255,255,255,0.9)" stroke-width="1.5"/><circle cx="11" cy="11" r="4.5" fill="rgba(255,255,255,0.45)"/></svg>`;
  return L.divIcon({html:s,iconSize:[22,28],iconAnchor:[11,28],popupAnchor:[0,-30],className:''});
}

function makePopup(h,c){
  const photo=st.photos[h.id]||EMBEDDED_PHOTOS[h.id]||h.photo;
  return `<div style="font-family:-apple-system,sans-serif;width:274px;">
    <div style="height:140px;background:url('${photo}') center/cover;background-color:#D8CAAF;position:relative;">
      <div style="position:absolute;inset:0;background:linear-gradient(to top,rgba(74,38,8,0.65) 0%,transparent 55%);"></div>
      <div style="position:absolute;bottom:9px;left:12px;right:12px;display:flex;justify-content:space-between;align-items:flex-end;">
        <span style="font-size:17px;font-weight:700;color:#fff;text-shadow:0 1px 5px rgba(0,0,0,0.5);">${h.price}</span>
        <span style="font-size:10px;background:rgba(255,255,255,0.2);color:#fff;padding:2px 9px;border-radius:10px;">${h.dom} days listed</span>
      </div>
    </div>
    <div style="padding:12px 14px 14px;background:#fff;">
      <div style="font-size:13px;font-weight:700;color:#4A2608;line-height:1.3;margin-bottom:3px;">${h.a}</div>
      <div style="font-size:11px;color:#7A4A20;margin-bottom:9px;display:flex;align-items:center;gap:5px;">
        <span style="width:7px;height:7px;border-radius:50%;background:${c.clr};display:inline-block;flex-shrink:0;"></span>
        ${c.n} &nbsp;·&nbsp; ${c.d==='W'?'Wednesday 4/15':'Thursday 4/16'}
      </div>
      <div style="display:flex;background:#EFE8DB;border-radius:7px;overflow:hidden;margin-bottom:9px;border:1px solid rgba(184,106,42,0.2);">
        <div style="flex:1;padding:7px 0;text-align:center;border-right:1px solid rgba(184,106,42,0.18);"><div style="font-size:16px;font-weight:700;color:#4A2608;">${h.beds}</div><div style="font-size:9px;color:#7A4A20;text-transform:uppercase;letter-spacing:0.06em;">Beds</div></div>
        <div style="flex:1;padding:7px 0;text-align:center;border-right:1px solid rgba(184,106,42,0.18);"><div style="font-size:16px;font-weight:700;color:#4A2608;">${h.baths}</div><div style="font-size:9px;color:#7A4A20;text-transform:uppercase;letter-spacing:0.06em;">Baths</div></div>
        <div style="flex:1;padding:7px 0;text-align:center;"><div style="font-size:16px;font-weight:700;color:#4A2608;">${(h.sqft/1000).toFixed(1)}k</div><div style="font-size:9px;color:#7A4A20;text-transform:uppercase;letter-spacing:0.06em;">Sqft</div></div>
      </div>
      <div style="margin-bottom:10px;line-height:2.2;">${h.features.map(f=>`<span style="display:inline-block;font-size:10px;background:#EFE8DB;color:#4A2608;padding:1px 7px;border-radius:10px;margin:1px 2px 1px 0;border:1px solid rgba(184,106,42,0.2);font-weight:500;">${f}</span>`).join('')}</div>
      <a href="${h.u}" target="_blank" style="display:block;text-align:center;font-size:12px;color:#2A8FA5;text-decoration:none;border:1px solid rgba(42,143,165,0.4);border-radius:7px;padding:7px;background:rgba(42,143,165,0.05);font-weight:600;">View on Zillow →</a>
      <div style="font-size:9px;color:#ccc;text-align:center;margin-top:6px;">* Prices estimated — verify on Zillow</div>
    </div>
  </div>`;
}

function rClist(){
  const dn={W:'Wednesday',T:'Thursday'};
  const list=st.day==='all'?C:C.filter(c=>c.d===st.day);
  document.getElementById('clist').innerHTML=list.map(c=>`
    <div class="cc${st.sc===c.id?' on':''}" style="${st.sc===c.id?'border-color:'+c.dk+';':''}" onclick="pC('${c.id}')">
      <div class="cc-photo" style="background-image:url('${c.photo}')"><div class="cc-overlay"></div></div>
      <div class="cc-body">
        <div class="cc-head"><div class="cdot" style="background:${c.clr}"></div><span class="cc-name">${c.n}</span></div>
        <div class="cc-sub">${dn[c.d]} &nbsp;·&nbsp; HOA ${c.hoa}</div>
        <div class="cc-desc">${c.desc}</div>
        <div class="tags">${c.am.map(a=>`<span class="tag">${a}</span>`).join('')}</div>
        <div class="cc-foot">${c.H.length} home${c.H.length!==1?'s':''} on your list</div>
      </div>
    </div>`).join('');
}
function pC(id){
  st.sc=st.sc===id?null:id;rClist();uM1();
  if(st.sc){const c=C.find(x=>x.id===id);m1.flyTo(c.ctr,c.z,{duration:0.7});}
  else m1.flyTo(dCtr(),dZ(),{duration:0.7});
}
function dCtr(){return st.day==='T'?[36.02,-115.00]:st.day==='W'?[36.292,-115.300]:[36.17,-115.15];}
function dZ(){return st.day==='all'?10:12;}
function fDay(d,btn){
  st.day=d;st.sc=null;
  document.querySelectorAll('.fbtn').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on');rClist();uM1();m1.flyTo(dCtr(),dZ(),{duration:0.7});
}
function uM1(){
  flat().forEach(h=>{
    if(!mk1[h.id])return;
    const v=(st.day==='all'||h.d===st.day)&&(!st.sc||h.cid===st.sc);
    mk1[h.id].setOpacity(v?1:0.1);
  });
}
function iM1(){
  m1=L.map('m1').setView([36.17,-115.15],10);
  L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png',{attribution:'© OpenStreetMap © CartoDB',maxZoom:18}).addTo(m1);
  C.forEach(c=>c.H.forEach(h=>{
    mk1[h.id]=L.marker([h.lat,h.lng],{icon:mIcon(c.clr)}).addTo(m1).bindPopup(()=>makePopup(h,c),{maxWidth:300,minWidth:276});
  }));
  const leg=L.control({position:'bottomleft'});
  leg.onAdd=()=>{
    const d=L.DomUtil.create('div');
    d.style.cssText='background:rgba(255,255,255,0.97);border:1px solid rgba(184,106,42,0.28);border-radius:9px;padding:8px 13px;font-size:11px;font-family:sans-serif;line-height:2;pointer-events:none;box-shadow:0 3px 14px rgba(184,106,42,0.14);';
    d.innerHTML=C.map(c=>`<div style="display:flex;align-items:center;gap:7px;color:#4A2608;font-weight:500;"><div style="width:9px;height:9px;border-radius:50%;background:${c.clr};flex-shrink:0;"></div>${c.n}</div>`).join('');
    return d;
  };
  leg.addTo(m1);
}

function rGrid(){
  const homes=flat();
  const n=Object.keys(st.R).length;
  document.getElementById('rated-count').textContent=n?`${n} of 14 rated`:'14 properties';
  document.getElementById('cgrid').innerHTML=homes.map(h=>{
    const r=st.R[h.id]||0;
    const photo=st.photos[h.id]||EMBEDDED_PHOTOS[h.id]||h.photo;
    const comm=C.find(c=>c.id===h.cid);
    return `<div class="hc${st.sh===h.id?' on':''}" style="${st.sh===h.id?'border-color:'+h.dk+';':''}" onclick="pH('${h.id}')">
      <div class="hc-inner">
        <div class="hc-thumb-col">
          <div class="hc-comm-bar" style="background:${h.clr};"></div>
          <img class="hc-thumb" src="${photo}" onerror="this.style.display='none'" alt="" style="margin-top:3px;height:calc(100% - 3px);">
          <label class="hc-upload-label" onclick="event.stopPropagation()">
            &#128247;
            <input type="file" accept="image/*" style="display:none" onchange="compressPhoto('${h.id}',this.files[0])">
          </label>
        </div>
        <div class="hc-details">
          <div class="hc-addr" title="${h.a}">${h.a}</div>
          <div class="hc-meta">
            <span class="bdg" style="background:${h.clr}22;color:${h.dk}">${h.cn}</span>
            <span class="bdg" style="background:#EFE8DB;color:#7A4A20">${h.d==='W'?'Wed 4/15':'Thu 4/16'}</span>
          </div>
          <div class="hc-price-line">
            <span class="hc-price">${h.price}</span>
            <span class="hc-dom">${h.dom}d listed</span>
          </div>
          <div class="hc-stats-line">${h.beds}bd &nbsp;·&nbsp; ${h.baths}ba &nbsp;·&nbsp; ${h.sqft.toLocaleString()} sqft</div>
          <div class="hc-feats">${h.features.slice(0,3).map(f=>`<span class="feat">${f}</span>`).join('')}</div>
          <div class="stars" id="sr${h.id}">${[1,2,3,4,5].map(n=>`<span class="star${r>=n?' lit':''}" onclick="event.stopPropagation();setR('${h.id}',${n})">&#9733;</span>`).join('')}</div>
          <textarea class="hnotes" placeholder="Tour notes..." onclick="event.stopPropagation()" oninput="setN('${h.id}',this.value)">${st.N[h.id]||''}</textarea>
          <a class="zlink" href="${h.u}" target="_blank" onclick="event.stopPropagation()">View on Zillow →</a>
        </div>
      </div>
    </div>`;
  }).join('');
}

function pH(id){
  st.sh=st.sh===id?null:id;rGrid();
  if(st.sh&&mk2[id]){
    const h=flat().find(x=>x.id===id);
    m2.flyTo([h.lat,h.lng],15,{duration:0.6});
    Object.values(mk2).forEach(m=>m.setOpacity(0.15));
    mk2[id].setOpacity(1).openPopup();
  } else {
    Object.values(mk2).forEach(m=>m.setOpacity(1));
    m2.flyTo([36.17,-115.15],10,{duration:0.6});
  }
}
function setR(id,n){
  st.R[id]=n;saveR();
  document.querySelectorAll('#sr'+id+' .star').forEach((s,i)=>s.classList.toggle('lit',i<n));
  const total=Object.keys(st.R).length;
  document.getElementById('rated-count').textContent=total?`${total} of 14 rated`:'14 properties';
}
function setN(id,v){st.N[id]=v;saveN();}
function iM2(){
  m2=L.map('m2').setView([36.17,-115.15],10);
  L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png',{attribution:'© OpenStreetMap © CartoDB',maxZoom:18}).addTo(m2);
  flat().forEach(h=>{
    mk2[h.id]=L.marker([h.lat,h.lng],{icon:mIcon(h.clr)}).addTo(m2)
      .bindPopup(`<div style="font-family:sans-serif;padding:2px;"><b style="color:#4A2608;font-size:12px;">${h.a}</b><br><span style="color:#7A4A20;font-size:11px;">${h.cn} · ${h.price}</span></div>`,{maxWidth:190});
  });
  const leg=L.control({position:'bottomleft'});
  leg.onAdd=()=>{
    const d=L.DomUtil.create('div');
    d.style.cssText='background:rgba(255,255,255,0.97);border:1px solid rgba(184,106,42,0.28);border-radius:9px;padding:8px 13px;font-size:11px;font-family:sans-serif;line-height:2;pointer-events:none;box-shadow:0 3px 14px rgba(184,106,42,0.14);';
    d.innerHTML=C.map(c=>`<div style="display:flex;align-items:center;gap:7px;color:#4A2608;font-weight:500;"><div style="width:9px;height:9px;border-radius:50%;background:${c.clr};flex-shrink:0;"></div>${c.n}</div>`).join('');
    return d;
  };
  leg.addTo(m2);
}
function gTab(n){
  document.querySelectorAll('.tab-btn').forEach((b,i)=>b.classList.toggle('active',i===n));
  document.querySelectorAll('.page').forEach((p,i)=>p.classList.toggle('active',i===n));
  if(n===0&&m1)setTimeout(()=>m1.invalidateSize(),60);
  if(n===1&&m2)setTimeout(()=>m2.invalidateSize(),60);
}
window.addEventListener('load',()=>{loadSaved();rClist();rGrid();iM1();iM2();});
</script>
</body>
</html>
