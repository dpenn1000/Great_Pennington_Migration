<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Great Pennington Migration — April 2026</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css">
<link href="https://cdn.jsdelivr.net/npm/@fontsource/cormorant-garamond@5/700.css" rel="stylesheet">
<style>
:root {
  --sand:      #EFE8DB; --sand-lt:   #F7F2EA; --sand-mid:  #E6DBCB; --sand-dk:   #D8CAAF;
  --copper:    #B86A2A; --copper-dk: #8A4E1C; --copper-lt: #D4915A;
  --turquoise: #2A8FA5; --gold: #E8A020;
  --brown:     #4A2608; --brown-lt:  #7A4A20;
  --border:    rgba(184,106,42,0.18); --border-md: rgba(184,106,42,0.32); --border-str: rgba(184,106,42,0.55);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: var(--sand); color: var(--brown); height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

/* HEADER */
.header { background: #fff; border-bottom: 1px solid var(--border-md); flex-shrink: 0; }
.header-top { display: flex; align-items: center; justify-content: space-between; padding: 10px 20px 8px; gap: 12px; }
.logo { display: flex; align-items: stretch; }
.logo-bar { width: 3px; background: linear-gradient(to bottom, var(--copper), var(--turquoise)); border-radius: 2px; margin-right: 12px; flex-shrink: 0; }
.logo-text { display: flex; flex-direction: column; justify-content: center; line-height: 1; }
.logo-great { font-size: 9px; letter-spacing: 0.35em; color: var(--brown-lt); text-transform: uppercase; margin-bottom: 1px; }
.logo-penn { font-family: "Cormorant Garamond", serif; font-size: 30px; font-weight: 700; background: linear-gradient(135deg, #B86A2A 0%, #2A8FA5 55%, #E8C87A 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; line-height: 1.05; }
.logo-bot { display: flex; align-items: baseline; gap: 16px; margin-top: 1px; }
.logo-migration { font-size: 9px; letter-spacing: 0.35em; color: var(--brown-lt); text-transform: uppercase; }
.logo-nv { font-size: 9px; letter-spacing: 0.22em; color: var(--copper-lt); text-transform: uppercase; }
.header-right { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
.disclaimer { font-size: 10px; color: #bbb; white-space: nowrap; }
.saved-flash { font-size: 10px; color: #5a9e5a; opacity: 0; transition: opacity 0.3s; font-weight: 600; white-space: nowrap; }
.saved-flash.show { opacity: 1; }
.hdr-btn { font-size: 11px; padding: 6px 12px; border-radius: 6px; border: 1px solid var(--border-md); background: none; cursor: pointer; font-weight: 600; transition: all 0.15s; white-space: nowrap; }
.export-btn { color: var(--copper); }
.export-btn:hover { background: var(--sand); border-color: var(--copper); }
.sync-btn { color: var(--turquoise); border-color: rgba(42,143,165,0.3); }
.sync-btn:hover { background: rgba(42,143,165,0.07); border-color: var(--turquoise); }
.sync-btn:disabled { opacity: 0.5; cursor: not-allowed; }
.tab-bar { display: flex; padding: 0 20px; border-top: 1px solid var(--border); }
.tab-btn { background: none; border: none; border-bottom: 2px solid transparent; padding: 7px 16px; font-size: 13px; font-weight: 500; color: var(--brown-lt); cursor: pointer; transition: all 0.15s; }
.tab-btn.active { color: var(--copper); border-bottom-color: var(--copper); font-weight: 600; }

/* PAGES */
.page { display: none; flex: 1; overflow: hidden; }
.page.active { display: flex; }
.leaflet-container { background: #ddd; }
.leaflet-popup-content { margin: 0; }
.leaflet-popup-content-wrapper { border-radius: 10px !important; padding: 0 !important; overflow: hidden; box-shadow: 0 8px 32px rgba(0,0,0,0.22) !important; }

/* LOADING */
.loading-overlay { position: fixed; inset: 0; background: var(--sand); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 9999; gap: 14px; transition: opacity 0.3s; }
.loading-overlay.hidden { opacity: 0; pointer-events: none; }
.loading-spinner { width: 32px; height: 32px; border: 3px solid var(--border-md); border-top-color: var(--copper); border-radius: 50%; animation: spin 0.8s linear infinite; }
.loading-text { font-size: 12px; color: var(--brown-lt); letter-spacing: 0.1em; }
@keyframes spin { to { transform: rotate(360deg); } }

/* COMMUNITY SIDEBAR */
.side { width: 286px; min-width: 286px; display: flex; flex-direction: column; background: var(--sand-mid); border-right: 1px solid var(--border-md); overflow: hidden; }
.filters { display: flex; gap: 5px; padding: 9px 10px; border-bottom: 1px solid var(--border-md); background: var(--sand-dk); flex-shrink: 0; }
.fbtn { font-size: 11px; padding: 4px 12px; border-radius: 20px; border: 1px solid var(--border-md); background: #fff; cursor: pointer; color: var(--brown-lt); font-weight: 500; transition: all 0.15s; }
.fbtn.on { background: var(--copper); color: #fff; border-color: var(--copper); }
.clist { flex: 1; overflow-y: auto; padding: 8px; }
.cc { border-radius: 10px; border: 1px solid var(--border); margin-bottom: 9px; cursor: pointer; background: #fff; overflow: hidden; transition: all 0.15s; }
.cc:hover { border-color: var(--border-str); box-shadow: 0 3px 12px rgba(184,106,42,0.12); }
.cc.on { border: 2px solid var(--copper); box-shadow: 0 4px 16px rgba(184,106,42,0.2); }
.cc-photo-wrap { height: 86px; position: relative; overflow: hidden; background: var(--sand-dk); }
.cc-photo { height: 100%; width: 100%; background-size: cover; background-position: center; }
.cc-overlay { position: absolute; inset: 0; background: linear-gradient(to top, rgba(74,38,8,0.6) 0%, transparent 58%); pointer-events: none; }
.cc-nav { position: absolute; top: 50%; transform: translateY(-50%); background: rgba(255,255,255,0.88); border: none; border-radius: 50%; width: 22px; height: 22px; font-size: 15px; cursor: pointer; color: var(--brown); z-index: 4; display: flex; align-items: center; justify-content: center; padding: 0; line-height: 1; }
.cc-nav:hover { background: #fff; }
.cc-nav-prev { left: 5px; }
.cc-nav-next { right: 5px; }
.cc-photo-count { position: absolute; bottom: 5px; right: 7px; background: rgba(0,0,0,0.42); color: #fff; font-size: 9px; padding: 1px 5px; border-radius: 3px; pointer-events: none; z-index: 3; }
.cc-body { padding: 10px 12px 11px; }
.cc-head { display: flex; align-items: center; gap: 7px; margin-bottom: 2px; }
.cdot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.cc-name { font-size: 13px; font-weight: 700; color: var(--brown); flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.cc-edit { background: none; border: none; font-size: 13px; cursor: pointer; color: var(--copper-lt); padding: 0 2px; opacity: 0.55; flex-shrink: 0; transition: opacity 0.15s; line-height: 1; }
.cc-edit:hover { opacity: 1; }
.cc-sub { font-size: 10px; color: var(--brown-lt); margin-bottom: 5px; font-weight: 500; }
.cc-desc { font-size: 11px; color: var(--brown-lt); line-height: 1.45; margin-bottom: 6px; }
.tags { display: flex; flex-wrap: wrap; gap: 3px; }
.tag { font-size: 10px; padding: 2px 6px; border-radius: 4px; background: var(--sand-mid); color: var(--brown); border: 1px solid var(--border); }
.cc-foot { font-size: 10px; color: var(--copper-lt); margin-top: 6px; font-style: italic; }
.mwrap { flex: 1; position: relative; }
#m1, #m2 { width: 100%; height: 100%; }
.hint { font-size: 10px; color: var(--brown-lt); padding: 6px 12px; border-top: 1px solid var(--border-md); flex-shrink: 0; text-align: center; background: var(--sand-dk); }

/* COMPARISON SIDE */
.comp-side { width: 300px; min-width: 300px; display: flex; flex-direction: column; background: var(--sand-mid); border-right: 1px solid var(--border-md); overflow: hidden; }
.comp-top { padding: 8px 10px; border-bottom: 1px solid var(--border-md); background: var(--sand-dk); flex-shrink: 0; }
.comp-top-label { font-size: 11px; color: var(--brown-lt); font-weight: 600; }
.comp-list { flex: 1; overflow-y: scroll; padding: 7px; display: flex; flex-direction: column; gap: 8px; scrollbar-width: thin; scrollbar-color: rgba(184,106,42,0.4) transparent; }

/* PROPERTY CARDS */
.hc { border-radius: 9px; border: 1px solid var(--border-md); background: #fff; cursor: pointer; transition: all 0.15s; overflow: hidden; }
.hc:hover { border-color: var(--border-str); box-shadow: 0 3px 10px rgba(184,106,42,0.14); }
.hc.on { border: 2px solid var(--copper); box-shadow: 0 4px 14px rgba(184,106,42,0.22); }
.hc-inner { display: flex; align-items: flex-start; }

/*
  THUMBNAIL COLUMN: block container with explicit height + in-flow image.
  height: 76px AND a display:block img child = bulletproof in all browsers.
  Comm-bar overlays on top via absolute. Nav buttons and upload also absolute.
*/
.hc-thumb-col {
  width: 76px;
  min-width: 76px;
  height: 76px;
  min-height: 76px;
  position: relative;
  flex-shrink: 0;
  overflow: hidden;
  margin: 8px 0 8px 8px;
  border-radius: 7px;
  background: var(--sand-mid);
}
.hc-comm-bar {
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 3px;
  z-index: 2;
}
.hc-thumb {
  display: block;
  width: 76px;
  height: 76px;
  object-fit: cover;
}

/* Nav overlay buttons — absolute on top of image */
.hc-nav {
  position: absolute;
  top: 50%;
  transform: translateY(-50%);
  background: rgba(255,255,255,0.9);
  border: none;
  border-radius: 50%;
  width: 16px; height: 16px;
  font-size: 11px;
  cursor: pointer;
  color: var(--brown);
  z-index: 3;
  display: flex; align-items: center; justify-content: center;
  padding: 0; line-height: 1;
  margin-top: 1px;   /* nudge below comm-bar visually */
}
.hc-nav-prev { left: 1px; }
.hc-nav-next { right: 1px; }
.hc-photo-count {
  position: absolute;
  bottom: 20px;
  left: 50%; transform: translateX(-50%);
  background: rgba(0,0,0,0.44);
  color: #fff; font-size: 8px;
  padding: 1px 4px; border-radius: 3px;
  z-index: 3; pointer-events: none; white-space: nowrap;
}
.hc-upload {
  position: absolute;
  bottom: 4px; left: 50%; transform: translateX(-50%);
  background: rgba(255,255,255,0.92);
  border: 1px solid var(--border-md);
  border-radius: 4px;
  padding: 2px 5px;
  font-size: 9px; color: var(--copper);
  cursor: pointer; font-weight: 600; white-space: nowrap; z-index: 3;
}
.hc-upload input { display: none; }

.hc-details { flex: 1; padding: 8px 10px 9px; display: flex; flex-direction: column; min-width: 0; overflow: hidden; }
.hc-addr-row { display: flex; align-items: center; gap: 4px; margin-bottom: 3px; }
.hc-addr { font-size: 11px; font-weight: 700; color: #2a1000; line-height: 1.3; flex: 1; min-width: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.hc-edit { background: none; border: none; font-size: 12px; cursor: pointer; color: var(--copper-lt); padding: 0 1px; opacity: 0.55; flex-shrink: 0; transition: opacity 0.15s; line-height: 1; }
.hc-edit:hover { opacity: 1; }
.hc-meta { display: flex; align-items: center; gap: 5px; margin-bottom: 5px; flex-wrap: wrap; }
.bdg { font-size: 9px; padding: 1px 5px; border-radius: 3px; font-weight: 600; white-space: nowrap; }
.hc-price-line { display: flex; align-items: baseline; gap: 8px; margin-bottom: 3px; }
.hc-price { font-size: 15px; font-weight: 700; color: var(--copper); line-height: 1; }
.hc-dom { font-size: 9px; color: var(--brown-lt); }
.hc-stats-line { font-size: 10px; color: var(--brown-lt); margin-bottom: 5px; font-weight: 500; }
.hc-feats { display: flex; flex-wrap: wrap; gap: 2px; margin-bottom: 6px; }
.feat { font-size: 9px; padding: 1px 5px; border-radius: 8px; background: var(--sand); color: var(--brown); border: 1px solid var(--border); white-space: nowrap; }
.stars { display: flex; gap: 2px; margin-bottom: 5px; }
.star { font-size: 15px; cursor: pointer; color: var(--sand-dk); line-height: 1; transition: color 0.1s, transform 0.1s; }
.star.lit { color: var(--gold); }
.star:hover { color: var(--copper-lt); transform: scale(1.15); }
.hnotes { width: 100%; font-size: 10px; border: 1px solid var(--border-md); border-radius: 5px; padding: 4px 7px; resize: none; height: 38px; background: var(--sand-lt); color: var(--brown); font-family: inherit; outline: none; transition: border-color 0.15s; line-height: 1.4; margin-bottom: 5px; }
.hnotes:focus { border-color: var(--copper); background: #fff; }
.hnotes::placeholder { color: var(--sand-dk); font-style: italic; }
.zlink { display: block; text-align: center; font-size: 9px; padding: 4px 0; border-radius: 5px; border: 1px solid rgba(42,143,165,0.35); color: var(--turquoise); text-decoration: none; font-weight: 600; background: rgba(42,143,165,0.05); transition: all 0.15s; }
.zlink:hover { background: rgba(42,143,165,0.12); border-color: var(--turquoise); }

/* FOOTER */
.app-footer { flex-shrink: 0; text-align: center; padding: 4px; background: var(--sand-dk); border-top: 1px solid var(--border); }
.import-link { font-size: 10px; color: var(--brown-lt); cursor: pointer; background: none; border: none; padding: 0; font-family: inherit; opacity: 0.6; transition: opacity 0.15s; }
.import-link:hover { opacity: 1; color: var(--copper); }

/* EDIT MODAL */
.modal-back { display: none; position: fixed; inset: 0; background: rgba(74,38,8,0.4); z-index: 2000; align-items: center; justify-content: center; padding: 16px; }
.modal-back.open { display: flex; }
.edit-modal { background: #fff; border-radius: 14px; width: 100%; max-width: 520px; max-height: 90vh; display: flex; flex-direction: column; box-shadow: 0 20px 60px rgba(74,38,8,0.28); }
.em-head { display: flex; align-items: flex-start; justify-content: space-between; padding: 18px 20px 14px; border-bottom: 1px solid var(--border); flex-shrink: 0; gap: 12px; }
.em-title { font-size: 14px; font-weight: 700; color: var(--brown); line-height: 1.3; }
.em-close { background: none; border: none; font-size: 22px; cursor: pointer; color: var(--brown-lt); padding: 0 4px; border-radius: 5px; line-height: 1; flex-shrink: 0; }
.em-close:hover { background: var(--sand); }
.em-body { flex: 1; overflow-y: auto; padding: 16px 20px; display: flex; flex-direction: column; gap: 12px; }
.em-foot { padding: 14px 20px; border-top: 1px solid var(--border); flex-shrink: 0; display: flex; gap: 8px; }
.em-save { flex: 1; padding: 10px; border-radius: 8px; border: none; background: var(--copper); color: #fff; font-size: 13px; font-weight: 600; cursor: pointer; transition: background 0.15s; }
.em-save:hover { background: var(--copper-dk); }
.em-save:disabled { background: var(--sand-dk); cursor: not-allowed; }
.em-cancel { padding: 10px 16px; border-radius: 8px; border: 1px solid var(--border-md); background: none; color: var(--brown-lt); font-size: 13px; cursor: pointer; }
.ef { display: flex; flex-direction: column; gap: 4px; }
.ef label { font-size: 10px; font-weight: 600; color: var(--brown-lt); text-transform: uppercase; letter-spacing: 0.06em; }
.ef input, .ef textarea { border: 1px solid var(--border-md); border-radius: 6px; padding: 7px 10px; font-size: 12px; color: var(--brown); background: var(--sand-lt); font-family: inherit; outline: none; transition: border-color 0.15s; width: 100%; }
.ef input:focus, .ef textarea:focus { border-color: var(--copper); background: #fff; }
.ef textarea { resize: vertical; min-height: 60px; }
.ef-row { display: flex; gap: 8px; }
.ef-row .ef { flex: 1; }

/* PHOTO MANAGER IN MODAL */
.mphoto-list { display: flex; gap: 8px; overflow-x: auto; padding-bottom: 6px; min-height: 90px; align-items: flex-start; }
.mphoto-item { position: relative; flex-shrink: 0; width: 78px; display: flex; flex-direction: column; align-items: center; gap: 4px; }
.mphoto-thumb { width: 78px; height: 78px; border-radius: 6px; overflow: hidden; border: 1px solid var(--border-md); background: var(--sand-mid); position: relative; }
.mphoto-thumb img { width: 100%; height: 100%; object-fit: cover; display: block; }
.mphoto-badge { position: absolute; bottom: 2px; left: 2px; background: rgba(0,0,0,0.5); color: #fff; font-size: 8px; padding: 1px 4px; border-radius: 2px; }
.mphoto-controls { display: flex; gap: 3px; }
.mphoto-btn-sm { background: none; border: 1px solid var(--border-md); border-radius: 4px; cursor: pointer; font-size: 10px; color: var(--brown-lt); padding: 2px 5px; line-height: 1.2; transition: all 0.12s; }
.mphoto-btn-sm:hover { border-color: var(--copper); color: var(--copper); }
.mphoto-btn-sm.rm { color: #c0392b; border-color: rgba(192,57,43,0.3); }
.mphoto-btn-sm.rm:hover { background: rgba(192,57,43,0.08); border-color: #c0392b; }
.mphoto-btn-sm:disabled { opacity: 0.25; cursor: not-allowed; }
.mphoto-btn-spacer { display: inline-block; width: 27px; height: 22px; }
.mphoto-add { display: flex; gap: 6px; align-items: center; margin-top: 6px; }
.mphoto-add input[type=text] { flex: 1; border: 1px solid var(--border-md); border-radius: 6px; padding: 6px 9px; font-size: 11px; color: var(--brown); background: var(--sand-lt); outline: none; font-family: inherit; min-width: 0; }
.mphoto-add input[type=text]:focus { border-color: var(--copper); background: #fff; }
.mphoto-add-btn { font-size: 11px; padding: 6px 10px; border-radius: 6px; border: 1px solid rgba(42,143,165,0.35); background: none; cursor: pointer; font-weight: 600; white-space: nowrap; color: var(--turquoise); transition: all 0.15s; }
.mphoto-add-btn:hover { background: rgba(42,143,165,0.08); border-color: var(--turquoise); }
.mphoto-upload-btn { font-size: 11px; padding: 6px 10px; border-radius: 6px; border: 1px solid var(--border-md); background: none; cursor: pointer; font-weight: 600; white-space: nowrap; color: var(--copper); }
.mphoto-upload-btn input { display: none; }

/* ZILLOW IMPORT */
.import-back { display: none; position: fixed; inset: 0; background: rgba(74,38,8,0.45); z-index: 1000; align-items: flex-end; justify-content: center; }
.import-back.open { display: flex; }
.import-panel { background: #fff; border-radius: 14px 14px 0 0; width: 100%; max-width: 760px; padding: 24px 28px 28px; box-shadow: 0 -8px 40px rgba(74,38,8,0.22); max-height: 90vh; overflow-y: auto; }
.imp-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 18px; }
.imp-title { font-size: 15px; font-weight: 700; color: var(--brown); }
.imp-sub { font-size: 11px; color: var(--brown-lt); margin-top: 2px; }
.imp-close { background: none; border: none; font-size: 20px; cursor: pointer; color: var(--brown-lt); line-height: 1; padding: 2px 6px; border-radius: 5px; }
.imp-close:hover { background: var(--sand); }
.imp-body { display: flex; gap: 20px; }
.imp-left { flex: 1; min-width: 0; }
.imp-right { width: 260px; min-width: 260px; }
.drop-zone { border: 2px dashed var(--border-md); border-radius: 10px; min-height: 140px; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 8px; cursor: pointer; transition: all 0.15s; background: var(--sand-lt); padding: 16px; text-align: center; position: relative; }
.drop-zone.drag-over { border-color: var(--turquoise); background: rgba(42,143,165,0.06); }
.drop-zone img { max-width: 100%; max-height: 130px; object-fit: contain; border-radius: 6px; }
.dz-hint { font-size: 11px; color: var(--brown-lt); }
.dz-icon { font-size: 26px; opacity: 0.4; }
.drop-zone input[type=file] { display: none; }
.imp-extract { width: 100%; margin-top: 10px; padding: 9px; border-radius: 8px; border: none; background: var(--copper); color: #fff; font-size: 13px; font-weight: 600; cursor: pointer; transition: background 0.15s; }
.imp-extract:hover { background: var(--copper-dk); }
.imp-extract:disabled { background: var(--sand-dk); color: var(--brown-lt); cursor: not-allowed; }
.imp-fields { display: flex; flex-direction: column; gap: 8px; }
.imp-field { display: flex; flex-direction: column; gap: 3px; }
.imp-field label { font-size: 10px; font-weight: 600; color: var(--brown-lt); text-transform: uppercase; letter-spacing: 0.06em; }
.imp-field input { border: 1px solid var(--border-md); border-radius: 6px; padding: 6px 9px; font-size: 12px; color: var(--brown); background: var(--sand-lt); font-family: inherit; outline: none; }
.imp-field input:focus { border-color: var(--copper); background: #fff; }
.imp-field-row { display: flex; gap: 8px; }
.imp-field-row .imp-field { flex: 1; }
.imp-status { font-size: 11px; margin-top: 6px; min-height: 18px; color: var(--brown-lt); font-style: italic; }
.imp-status.err { color: #c0392b; font-style: normal; }
.imp-copy { width: 100%; margin-top: 12px; padding: 9px; border-radius: 8px; border: 1px solid var(--border-md); background: none; color: var(--turquoise); font-size: 12px; font-weight: 600; cursor: pointer; transition: all 0.15s; }
.imp-copy:hover { background: rgba(42,143,165,0.08); border-color: var(--turquoise); }
.imp-output { margin-top: 10px; background: var(--sand-lt); border: 1px solid var(--border-md); border-radius: 8px; padding: 10px 12px; font-size: 10px; font-family: "SF Mono", "Fira Code", monospace; color: var(--brown); white-space: pre; overflow-x: auto; display: none; line-height: 1.7; }

::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border-str); border-radius: 2px; }
</style>
</head>
<body>

<div class="loading-overlay" id="loading">
  <div class="loading-spinner"></div>
  <div class="loading-text" id="loading-text">Loading properties...</div>
</div>

<div class="header">
  <div class="header-top">
    <div class="logo">
      <div class="logo-bar"></div>
      <div class="logo-text">
        <div class="logo-great">The Great</div>
        <div class="logo-penn">Pennington</div>
        <div class="logo-bot">

<script>
/* ============================================================
   CONFIG

const SUPA_URL = 'https://kqsmprkeavuchcpnixfx.supabase.co';
const SUPA_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imtxc21wcmtlYXZ1Y2hjcG5peGZ4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYwODg3OTQsImV4cCI6MjA5MTY2NDc5NH0.9VC01RrDwxViNimZ9ZYGEU8eKatrAlf82DHWebbMTuQ';
const db = window.supabase.createClient(SUPA_URL, SUPA_KEY);

/* ============================================================

let C = [];
const SBP = {};      // Supabase property_data keyed by id

const st = { day:'all', sc:null, sh:null, pidx:{} };
let m1, m2, mk1={}, mk2={};
let editMode=null, editId=null, mPhotos=[];

/* ============================================================

   ============================================================ */
(async function bootstrap() {
  try {
    const [jsonData] = await Promise.all([
      fetch('data/properties.json').then(r => { if (!r.ok) throw new Error('JSON ' + r.status); return r.json(); }),
      loadSB()
    ]);
    C = jsonData.communities;
    rClist(); rGrid(); iM1(); iM2();
    document.getElementById('loading').classList.add('hidden');
    setTimeout(() => document.getElementById('loading').remove(), 400);
  } catch(e) {
    document.getElementById('loading-text').textContent = 'Load error: ' + e.message;

})();

/* ============================================================
   SUPABASE
   ============================================================ */
async function loadSB() {
  const [p, c] = await Promise.all([
    db.from('property_data').select('*'),
    db.from('community_data').select('*')
  ]);
  (p.data||[]).forEach(r => SBP[r.id] = r);
  (c.data||[]).forEach(r => SBC[r.id] = r);
}

async function syncData() {
  const btn = document.getElementById('sync-btn');
  btn.disabled = true; btn.textContent = '&#8635; Syncing...';
  await loadSB();
  rClist(); rGrid();
  btn.disabled = false; btn.textContent = '&#8635; Sync';
  flash();
}

function flash() {
  const el = document.getElementById('saved-flash');
  if (!el) return;
  el.classList.add('show');
  clearTimeout(el._t);
  el._t = setTimeout(() => el.classList.remove('show'), 2000);
}

/* ============================================================
   DATA HELPERS
   ============================================================ */
function merged(h, c) {
  const sb = SBP[h.id] || {};
  return {
    ...h,
    cid:c.id, cn:c.name, clr:c.color, dk:c.colorDark, d:c.day, cphoto:c.photo,
    price:    sb.price    || h.price,
    beds:     sb.beds     ?? h.beds,
    baths:    sb.baths    ?? h.baths,
    sqft:     sb.sqft     ?? h.sqft,
    dom:      sb.dom      ?? h.dom,
    features: sb.features || h.features,
    zillow:   sb.zillow   || h.zillow,
    rating:   sb.rating   || 0,
    notes:    sb.notes    || '',
  };
}
function flat() { return C.flatMap(c => c.properties.map(h => merged(h, c))); }
function propPhotos(h) { return [h.photo, ...(SBP[h.id]?.photos||[])].filter(Boolean); }
function commPhotos(c) { return [c.photo, ...(SBC[c.id]?.photos||[])].filter(Boolean); }
function currentPhoto(h) {
  const photos = propPhotos(h);
  return photos[Math.min(st.pidx[h.id]||0, photos.length-1)] || h.cphoto || '';
}

/* ============================================================
   COMMUNITY EXPLORER
   ============================================================ */
function rClist() {
  const dn = { W:'Wednesday', T:'Thursday' };
  const list = st.day==='all' ? C : C.filter(c=>c.day===st.day);
  document.getElementById('clist').innerHTML = list.map(c => {
    const sb = SBC[c.id]||{};

    const amenities=sb.amenities||c.amenities, hoa=sb.hoa||c.hoa;
    const photos=commPhotos(c);
    const key='c_'+c.id;
    const idx=Math.min(st.pidx[key]||0,photos.length-1);
    return `<div class="cc${st.sc===c.id?' on':''}" style="${st.sc===c.id?'border-color:'+c.colorDark+';':''}" onclick="pC('${c.id}')">
      <div class="cc-photo-wrap">
        <div class="cc-photo" id="ccp-${c.id}" style="background-image:url('${photos[idx]||''}')"></div>
        <div class="cc-overlay"></div>
        ${photos.length>1?`
          <button class="cc-nav cc-nav-prev" onclick="navComm('${c.id}',-1,event)">&#8249;</button>
          <button class="cc-nav cc-nav-next" onclick="navComm('${c.id}',1,event)">&#8250;</button>
          <div class="cc-photo-count">${idx+1}/${photos.length}</div>`:``}
      </div>
      <div class="cc-body">
        <div class="cc-head">
          <div class="cdot" style="background:${c.color}"></div>
          <span class="cc-name">${name}</span>
          <button class="cc-edit" onclick="openCommEdit('${c.id}',event)" title="Edit">&#9998;</button>
        </div>
        <div class="cc-sub">${dn[c.day]} &nbsp;&middot;&nbsp; HOA ${hoa}</div>
        <div class="cc-desc">${desc}</div>
        <div class="tags">${amenities.map(a=>`<span class="tag">${a}</span>`).join('')}</div>
        <div class="cc-foot">${c.properties.length} home${c.properties.length!==1?'s':''} on your list</div>
      </div>
    </div>`;
  }).join('');
}

function navComm(id,dir,e) {
  e.stopPropagation();
  const c=C.find(x=>x.id===id); if(!c) return;
  const photos=commPhotos(c), key='c_'+id;
  st.pidx[key]=((st.pidx[key]||0)+dir+photos.length)%photos.length;
  const el=document.getElementById('ccp-'+id);
  if(el) el.style.backgroundImage=`url('${photos[st.pidx[key]]}')`;
}
function pC(id) {
  st.sc=st.sc===id?null:id; rClist(); uM1();
  if(st.sc){const c=C.find(x=>x.id===id); m1.flyTo(c.center,c.zoom,{duration:0.7});}
  else m1.flyTo(dCtr(),dZ(),{duration:0.7});
}
function dCtr(){return st.day==='T'?[36.02,-115.00]:st.day==='W'?[36.292,-115.300]:[36.17,-115.15];}
function dZ()  {return st.day==='all'?10:12;}
function fDay(d,btn){
  st.day=d; st.sc=null;
  document.querySelectorAll('.fbtn').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on'); rClist(); uM1(); m1.flyTo(dCtr(),dZ(),{duration:0.7});
}
function uM1(){
  flat().forEach(h=>{
    if(!mk1[h.id]) return;
    mk1[h.id].setOpacity((st.day==='all'||h.d===st.day)&&(!st.sc||h.cid===st.sc)?1:0.1);
  });
}
function iM1(){
  m1=L.map('m1').setView([36.17,-115.15],10);
  L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png',{attribution:'&copy; OpenStreetMap &copy; CartoDB',maxZoom:18}).addTo(m1);
  flat().forEach(h=>{
    const comm=C.find(c=>c.id===h.cid);
    mk1[h.id]=L.marker([h.lat,h.lng],{icon:mIcon(h.clr)}).addTo(m1).bindPopup(()=>makePopup(h,comm),{maxWidth:300,minWidth:276});
  });
  addLeg(m1);
}

/* ============================================================
   COMPARISON TRACKER
   ============================================================ */
function rGrid() {
  const homes=flat();
  const rated=homes.filter(h=>h.rating>0).length;
  document.getElementById('rated-count').textContent=rated?`${rated} of ${homes.length} rated`:`${homes.length} properties`;
  document.getElementById('cgrid').innerHTML=homes.map(h=>{
    const photos=propPhotos(h);
    const idx=Math.min(st.pidx[h.id]||0,photos.length-1);
    const photo=photos[idx]||h.cphoto||'';
    const r=h.rating;
    return `<div class="hc${st.sh===h.id?' on':''}" style="${st.sh===h.id?'border-color:'+h.dk+';':''}" onclick="pH('${h.id}')">
      <div class="hc-inner">
        <div class="hc-thumb-col" id="tc-${h.id}">
          <div class="hc-comm-bar" style="background:${h.clr};"></div>
          <img class="hc-thumb" src="${photo}" onerror="if(this.src!=='${h.cphoto||''}')this.src='${h.cphoto||''}'" alt="">
          ${photos.length>1?`
            <button class="hc-nav hc-nav-prev" onclick="navProp('${h.id}',-1,event)">&#8249;</button>
            <button class="hc-nav hc-nav-next" onclick="navProp('${h.id}',1,event)">&#8250;</button>
            <div class="hc-photo-count">${idx+1}/${photos.length}</div>`:``}
          <label class="hc-upload" onclick="event.stopPropagation()" title="Upload photo">
            &#128247;<input type="file" accept="image/*" onchange="uploadPhoto('${h.id}',this.files[0])">
          </label>
        </div>
        <div class="hc-details">
          <div class="hc-addr-row">
            <div class="hc-addr" title="${h.address}">${h.address}</div>
            <button class="hc-edit" onclick="openPropEdit('${h.id}',event)" title="Edit">&#9998;</button>
          </div>
          <div class="hc-meta">
            <span class="bdg" style="background:${h.clr}22;color:${h.dk}">${h.cn}</span>
            <span class="bdg" style="background:#EFE8DB;color:#7A4A20">${h.d==='W'?'Wed 4/15':'Thu 4/16'}</span>
          </div>
          <div class="hc-price-line"><span class="hc-price">${h.price}</span><span class="hc-dom">${h.dom}d listed</span></div>
          <div class="hc-stats-line">${h.beds}bd &nbsp;&middot;&nbsp; ${h.baths}ba &nbsp;&middot;&nbsp; ${h.sqft.toLocaleString()} sqft</div>
          <div class="hc-feats">${h.features.slice(0,3).map(f=>`<span class="feat">${f}</span>`).join('')}</div>
          <div class="stars" id="sr${h.id}">${[1,2,3,4,5].map(n=>`<span class="star${r>=n?' lit':''}" onclick="event.stopPropagation();setR('${h.id}',${n})">&#9733;</span>`).join('')}</div>
          <textarea class="hnotes" id="notes-${h.id}" placeholder="Tour notes..." onclick="event.stopPropagation()" oninput="setN('${h.id}',this.value)">${h.notes}</textarea>
          <a class="zlink" href="${h.zillow}" target="_blank" onclick="event.stopPropagation()">View on Zillow &rarr;</a>
        </div>
      </div>
    </div>`;
  }).join('');
}

function navProp(id,dir,e){
  e.stopPropagation();
  const h=flat().find(x=>x.id===id); if(!h) return;
  const photos=propPhotos(h);
  st.pidx[id]=((st.pidx[id]||0)+dir+photos.length)%photos.length;
  const col=document.getElementById('tc-'+id); if(!col) return;
  const img=col.querySelector('.hc-thumb');
  const cnt=col.querySelector('.hc-photo-count');
  if(img) img.src=photos[st.pidx[id]]||h.cphoto||'';
  if(cnt) cnt.textContent=`${st.pidx[id]+1}/${photos.length}`;
}

function pH(id){
  st.sh=st.sh===id?null:id; rGrid();
  if(st.sh&&mk2[id]){
    const h=flat().find(x=>x.id===id);
    m2.flyTo([h.lat,h.lng],15,{duration:0.6});
    Object.values(mk2).forEach(m=>m.setOpacity(0.15));
    mk2[id].setOpacity(1).openPopup();
  } else {
    Object.values(mk2).forEach(m=>m.setOpacity(1));
    m2.flyTo([36.17,-115.15],10,{duration:0.6});
  }
}
async function setR(id,n){
  SBP[id]={...(SBP[id]||{id}),rating:n};
  document.querySelectorAll(`#sr${id} .star`).forEach((s,i)=>s.classList.toggle('lit',i<n));
  const rated=flat().filter(h=>h.rating>0).length;
  document.getElementById('rated-count').textContent=`${rated} of ${flat().length} rated`;
  await db.from('property_data').upsert({id,rating:n},{onConflict:'id'});
  flash();
}
function setN(id,v){
  SBP[id]={...(SBP[id]||{id}),notes:v};
  clearTimeout(nTimers[id]);
  nTimers[id]=setTimeout(async()=>{
    await db.from('property_data').upsert({id,notes:v},{onConflict:'id'});
    flash();
  },800);
}
async function uploadPhoto(id,file){
  if(!file) return;
  const reader=new FileReader();
  reader.onload=async e=>{
    const img=new Image();
    img.onload=async()=>{
      const canvas=document.createElement('canvas');
      const maxW=700, scale=Math.min(1,maxW/img.width);
      canvas.width=Math.round(img.width*scale); canvas.height=Math.round(img.height*scale);
      canvas.getContext('2d').drawImage(img,0,0,canvas.width,canvas.height);
      const dataUrl=canvas.toDataURL('image/jpeg',0.78);
      const existing=SBP[id]?.photos||[];
      const photos=[...existing,dataUrl];
      SBP[id]={...(SBP[id]||{id}),photos};
      st.pidx[id]=photos.length;
      await db.from('property_data').upsert({id,photos},{onConflict:'id'});
      rGrid(); flash();
    };
    img.src=e.target.result;
  };
  reader.readAsDataURL(file);
}
function iM2(){
  m2=L.map('m2').setView([36.17,-115.15],10);
  L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png',{attribution:'&copy; OpenStreetMap &copy; CartoDB',maxZoom:18}).addTo(m2);
  flat().forEach(h=>{
    mk2[h.id]=L.marker([h.lat,h.lng],{icon:mIcon(h.clr)}).addTo(m2)
      .bindPopup(`<div style="font-family:sans-serif;padding:2px;"><b style="color:#4A2608;font-size:12px;">${h.address}</b><br><span style="color:#7A4A20;font-size:11px;">${h.cn} &middot; ${h.price}</span></div>`,{maxWidth:190});
  });
  addLeg(m2);
}

/* ============================================================
   PHOTO MANAGER - SHARED
   ============================================================ */
function renderMPhotos(basePhoto) {
  // Base photo (index -1 conceptually): shown but locked
  const baseHTML = basePhoto
    ? `<div class="mphoto-item">
        <div class="mphoto-thumb">
          <img src="${basePhoto}" onerror="this.style.opacity=0.3" alt="">
          <span class="mphoto-badge">base</span>
        </div>
        <div class="mphoto-controls">
          <button class="mphoto-btn-sm" disabled title="Base photo cannot be moved">&#8593;</button>
          <button class="mphoto-btn-sm" disabled title="Base photo cannot be moved">&#8595;</button>
        </div>
      </div>`
    : '';

  const extrasHTML = mPhotos.map((p,i) => `
    <div class="mphoto-item" id="mph-${i}">
      <div class="mphoto-thumb">
        <img src="${p}" onerror="this.style.opacity=0.3" alt="">
      </div>
      <div class="mphoto-controls">
        ${mPhotos.length > 1 && i > 0 ? `<button class="mphoto-btn-sm" onclick="moveMPhoto(${i},-1)" title="Move earlier">&#8593;</button>` : `<span class="mphoto-btn-spacer"></span>`}
        ${mPhotos.length > 1 && i < mPhotos.length-1 ? `<button class="mphoto-btn-sm" onclick="moveMPhoto(${i},1)" title="Move later">&#8595;</button>` : `<span class="mphoto-btn-spacer"></span>`}
        <button class="mphoto-btn-sm rm" onclick="rmMPhoto(${i})" title="Delete photo">&#215;</button>
      </div>
    </div>`).join('');

  return baseHTML + extrasHTML;
}

function refreshMPhotos(){
  const base=editMode==='property'
    ? (flat().find(x=>x.id===editId)?.photo||'')
    : (C.find(x=>x.id===editId)?.photo||'');
  document.getElementById('mphoto-list').innerHTML=renderMPhotos(base);
}

function moveMPhoto(i,dir){
  const j=i+dir;
  if(j<0||j>=mPhotos.length) return;
  [mPhotos[i],mPhotos[j]]=[mPhotos[j],mPhotos[i]];
  refreshMPhotos();
}

function rmMPhoto(i){ mPhotos.splice(i,1); refreshMPhotos(); }

function addMPhotoUrl(){
  const url=document.getElementById('mphoto-url').value.trim();
  if(!url) return;
  mPhotos.push(url);
  document.getElementById('mphoto-url').value='';
  refreshMPhotos();
}

function addMPhotoUpload(file){
  if(!file) return;
  const reader=new FileReader();
  reader.onload=e=>{
    const img=new Image();
    img.onload=()=>{
      const canvas=document.createElement('canvas');
      const maxW=800, scale=Math.min(1,maxW/img.width);
      canvas.width=Math.round(img.width*scale); canvas.height=Math.round(img.height*scale);
      canvas.getContext('2d').drawImage(img,0,0,canvas.width,canvas.height);
      mPhotos.push(canvas.toDataURL('image/jpeg',0.80));
      refreshMPhotos();
    };
    img.src=e.target.result;
  };
  reader.readAsDataURL(file);
}

async function saveEdit(){
  const btn=document.getElementById('em-save');
  btn.disabled=true; btn.textContent='Saving...';
  try{
    if(editMode==='property'){
      const fields={
        id:editId,
        price:document.getElementById('ef-price').value.trim(),
        beds:parseFloat(document.getElementById('ef-beds').value)||null,
        baths:parseFloat(document.getElementById('ef-baths').value)||null,
        sqft:parseInt(document.getElementById('ef-sqft').value)||null,
        dom:parseInt(document.getElementById('ef-dom').value)||null,
        features:document.getElementById('ef-feats').value.split(',').map(f=>f.trim()).filter(Boolean),
        zillow:document.getElementById('ef-zillow').value.trim(),
        notes:document.getElementById('ef-notes').value,
        photos:mPhotos,
      };
      SBP[editId]={...(SBP[editId]||{}),...fields};
      await db.from('property_data').upsert(fields,{onConflict:'id'});
    } else {
      const fields={
        id:editId,
        name:document.getElementById('ef-cname').value.trim(),
        description:document.getElementById('ef-cdesc').value.trim(),
        amenities:document.getElementById('ef-camen').value.split(',').map(a=>a.trim()).filter(Boolean),
        hoa:document.getElementById('ef-choa').value.trim(),
        photos:mPhotos,
      };
      SBC[editId]={...(SBC[editId]||{}),...fields};
      await db.from('community_data').upsert(fields,{onConflict:'id'});
    }
    closeEdit(); rClist(); rGrid(); flash();
  } catch(err){
    alert('Save failed: '+err.message);
  } finally {
    btn.disabled=false; btn.textContent='Save changes';
  }
}
function closeEdit(){
  document.getElementById('edit-modal').classList.remove('open');
  editMode=null; editId=null; mPhotos=[];
}
function closeEditIfBack(e){ if(e.target===document.getElementById('edit-modal')) closeEdit(); }

function gTab(n){
  document.querySelectorAll('.tab-btn').forEach((b,i)=>b.classList.toggle('active',i===n));
  document.querySelectorAll('.page').forEach((p,i)=>p.classList.toggle('active',i===n));
  if(n===0&&m1) setTimeout(()=>m1.invalidateSize(),60);
  if(n===1&&m2) setTimeout(()=>m2.invalidateSize(),60);

function exportNotes(){
  const homes=flat();
  let txt='PENNINGTON HOUSE TOUR NOTES\nApril 15-16, 2026 | Las Vegas & Henderson, NV\n';
  txt+='Generated: '+new Date().toLocaleDateString('en-US',{month:'long',day:'numeric',year:'numeric'})+'\n';
  txt+='============================================\n\n';
  const reviewed=homes.filter(h=>h.rating>0||h.notes);
  const unreviewed=homes.filter(h=>!h.rating&&!h.notes);
  if(reviewed.length){
    txt+='REVIEWED\n\n';
    reviewed.forEach(h=>{
      txt+=h.cn+' | '+h.address+'\n';
      txt+=h.price+' | '+h.beds+'bd/'+h.baths+'ba | '+h.sqft.toLocaleString()+' sqft | '+h.dom+' days\n';
      txt+='Rating: '+'\u2605'.repeat(h.rating)+'\u2606'.repeat(5-h.rating)+'\n';
      txt+='Notes: '+(h.notes||'(none)')+'\n';
      txt+=h.zillow+'\n\n';
    });
  }
  if(unreviewed.length){
    txt+='\nNOT YET REVIEWED\n';
    unreviewed.forEach(h=>{txt+=h.cn+' | '+h.address+' | '+h.price+'\n';});
  }
  const a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob([txt],{type:'text/plain'}));
  a.download='pennington-tour-notes.txt'; a.click();
}

/* ============================================================
   ZILLOW IMPORT
   ============================================================ */
let impB64=null;
function openImport()  {document.getElementById('import-back').classList.add('open');}
function closeImport() {document.getElementById('import-back').classList.remove('open');}
function closeImportIfBack(e){if(e.target===document.getElementById('import-back'))closeImport();}
function dzOver(e){e.preventDefault();document.getElementById('drop-zone').classList.add('drag-over');}
function dzLeave(){document.getElementById('drop-zone').classList.remove('drag-over');}
function dzDrop(e){e.preventDefault();dzLeave();const f=e.dataTransfer.files[0];if(f&&f.type.startsWith('image/'))dzFile(f);}
function dzFile(file){
  if(!file)return;
  const r=new FileReader();
  r.onload=e=>{
    impB64=e.target.result.split(',')[1];
    const p=document.getElementById('dz-preview');
    p.src=e.target.result; p.style.display='block';
    document.getElementById('dz-icon').style.display='none';
    document.getElementById('dz-hint').style.display='none';
    document.getElementById('imp-extract').disabled=false;
    document.getElementById('imp-status').textContent='Ready. Click Extract.';
  };
  r.readAsDataURL(file);
}
async function runExtract(){
  const btn=document.getElementById('imp-extract'),status=document.getElementById('imp-status');
  btn.disabled=true; btn.textContent='Extracting...'; status.textContent='Calling Claude vision API...';
  try{
    const res=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:1000,messages:[{role:'user',content:[
        {type:'image',source:{type:'base64',media_type:'image/jpeg',data:impB64}},
        {type:'text',text:'Extract from this Zillow screenshot: address, price, beds, baths, sqft, days on market. Return ONLY valid JSON with keys: address, price, beds, baths, sqft, dom. No markdown.'}
      ]}]})
    });
    const data=await res.json();
    const parsed=JSON.parse(data.content.map(b=>b.text||'').join('').replace(/```json|```/g,'').trim());
    document.getElementById('if-addr').value=parsed.address||'';
    document.getElementById('if-price').value=parsed.price||'';
    document.getElementById('if-beds').value=parsed.beds||'';
    document.getElementById('if-baths').value=parsed.baths||'';
    document.getElementById('if-sqft').value=parsed.sqft||'';
    document.getElementById('if-dom').value=parsed.dom||'';
    status.textContent='Done! Edit fields then copy.'; buildSnippet();
  }catch(err){
    status.textContent='Error: '+err.message; status.className='imp-status err';
  }finally{btn.disabled=false;btn.textContent='Extract listing details';}
}
function buildSnippet(){
  const s={id:'hXX',address:document.getElementById('if-addr').value,lat:0,lng:0,zillow:'',
    price:document.getElementById('if-price').value,
    beds:Number(document.getElementById('if-beds').value)||0,
    baths:Number(document.getElementById('if-baths').value)||0,
    sqft:Number(document.getElementById('if-sqft').value)||0,
    dom:Number(document.getElementById('if-dom').value)||0,
    features:[],photo:'',photo2:''};
  const out=document.getElementById('imp-output');
  out.textContent=JSON.stringify(s,null,2); out.style.display='block';
}
function copySnippet(){
  buildSnippet();
  navigator.clipboard.writeText(document.getElementById('imp-output').textContent).then(()=>{
    const b=document.getElementById('imp-copy-btn');
    b.textContent='Copied!'; setTimeout(()=>b.textContent='Copy JSON snippet',2000);
  });
}
['if-addr','if-price','if-beds','if-baths','if-sqft','if-dom'].forEach(id=>{
  const el=document.getElementById(id);
  if(el) el.addEventListener('input',()=>{if(document.getElementById('imp-output').style.display==='block')buildSnippet();});
});

document.addEventListener('keydown',e=>{if(e.key==='Escape'){closeEdit();closeImport();}});
document.addEventListener('paste',e=>{
  if(!document.getElementById('import-back').classList.contains('open'))return;
  const item=Array.from(e.clipboardData.items).find(i=>i.type.startsWith('image/'));
  if(item)dzFile(item.getAsFile());
});
